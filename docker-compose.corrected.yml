      - HYPERCODE_API_KEY=${API_KEY:-dev-master-key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENT_PORT=8002
    volumes:
      - ./agents/coder/workspace:/workspace
      - ./agents/base-agent/agent.py:/app/base_agent.py:ro
      - ./Configuration_Kit:/app/hive_mind:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agents/shared:/app/shared:ro
      - ./agents/HYPER-AGENT-BIBLE.md:/app/HYPER-AGENT-BIBLE.md:ro
      - agent_memory:/app/memory
    ports:
      - "8002:8002"
    networks:
      - backend-net
    depends_on:
      hypercode-core:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
