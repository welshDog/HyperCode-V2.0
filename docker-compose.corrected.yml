version: "3.9"

networks:
  frontend-net:
    driver: bridge
    name: hypercode_frontend_net
  backend-net:
    name: hypercode_public_net
    external: true
  data-net:
    driver: bridge
    name: hypercode_data_net
    internal: true

volumes:
  redis-data:
  postgres-data:
  grafana-data:
  prometheus-data:
  ollama-data:
  agent_memory:
  minio_data:

services:
  # ====================
  # CORE SERVICES
  # ====================
  hypercode-core:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hypercode-core
    environment:
      - ENVIRONMENT=production
      - PRISMA_PY_DEBUG=0
      - HYPERCODE_REDIS_URL=${HYPERCODE_REDIS_URL}
      - HYPERCODE_DB_URL=${HYPERCODE_DB_URL}
      - HYPERCODE_MEMORY_KEY=${HYPERCODE_MEMORY_KEY}
      - API_KEY=${API_KEY}
      - HYPERCODE_JWT_SECRET=${HYPERCODE_JWT_SECRET}
      - JWT_SECRET=${HYPERCODE_JWT_SECRET} # Ensure backward compatibility
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OTLP_EXPORTER_DISABLED=${OTLP_EXPORTER_DISABLED}
      - OTLP_ENDPOINT=http://tempo:4317
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    ports:
      - "127.0.0.1:8000:8000" # Localhost only for security
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./backend:/app
      - ./docs/outputs:/app/outputs

  # Frontend - Terminal
  # broski-terminal:
  #   build:
  #     context: ./BROski Business Agents/broski-terminal
  #     dockerfile: Dockerfile
  #   container_name: broski-terminal
  #   environment:
  #     NEXT_PUBLIC_CORE_URL: ${NEXT_PUBLIC_CORE_URL:-http://localhost:8000}
  #     NEXT_PUBLIC_AGENTS_URL: ${NEXT_PUBLIC_AGENTS_URL:-http://localhost:8000}
  #     HOSTNAME: "0.0.0.0"
  #   healthcheck:
  #     test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) process.exit(1)})"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #   networks:
  #     - frontend-net
  #     - backend-net
  #   ports:
  #     - "3000:3000" # Public facing
  #   depends_on:
  #     hypercode-core:
  #       condition: service_healthy
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "1"
  #         memory: 1G
  #       reservations:
  #         cpus: "0.25"
  #         memory: 256M
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"
  #   security_opt:
  #     - no-new-privileges:true

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    # privileged: true # Required for some filesystem metrics in Docker Desktop
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      # Explicitly enable collectors that might be failing or disabled by default
      - '--collector.filesystem'
      - '--collector.cpu'
      - '--collector.meminfo'
      - '--collector.netclass.ignored-devices=^$' # Try to catch all devices
    ports:
      - "9100:9100"
    networks:
      - backend-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # cAdvisor - Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    # privileged: true # Required for cAdvisor to access Docker internals
    # Using specific mounts instead of privileged mode for better security
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8090:8080" # Mapped to 8090 to avoid conflict with other services
    networks:
      - backend-net
    restart: unless-stopped
    devices:
      - /dev/kmsg
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MinIO - S3 Compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    networks:
      - backend-net
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml
    networks:
      - backend-net
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"   # tempo
      - "4317:4317"  # otlp grpc
      - "4318:4318"  # otlp http
      - "9412:9411"   # zipkin (changed from 9411 to avoid conflict with Jaeger)
    networks:
      - backend-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - backend-net
    restart: unless-stopped

  # Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: celery-worker
    command: ["python", "-m", "celery", "-A", "app.core.celery_app", "worker", "--loglevel=info", "-Q", "main-queue"]
    dns:
      - 8.8.8.8
    volumes:
      - ./backend:/app
      - ./docs/outputs:/app/outputs
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      PYTHONPATH: /home/appuser/.local/lib/python3.11/site-packages:/app
      HYPERCODE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-hypercode}
      HYPERCODE_REDIS_URL: redis://redis:6379/0
      HYPERCODE_MEMORY_KEY: ${HYPERCODE_MEMORY_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "python -m celery -A app.core.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      hypercode-core:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: celery-exporter
    command: --broker-url=redis://redis:6379/0
    ports:
      - "9808:9808"
    networks:
      - backend-net
      - data-net
    depends_on:
      - redis
      - celery-worker
    restart: unless-stopped

  # ====================
  # AGENTS
  # ====================
  
  coder-agent:
    profiles: ["agents"]
    build:
