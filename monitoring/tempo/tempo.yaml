server:
  http_listen_port: 3100
distributor:
  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}
ingester:
  max_block_bytes: 1_000_000
  max_block_duration: 5m
storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks
compactor:
  compaction:
    block_retention: 1h
