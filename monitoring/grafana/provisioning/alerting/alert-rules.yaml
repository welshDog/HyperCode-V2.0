apiVersion: 1

groups:
  - orgId: 1
    name: HyperCode Alerts
    folder: Alerts
    interval: 1m
    rules:
      - uid: cpu_usage_high
        title: High CPU Usage
        condition: A
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: P1809F7CD0C75ACF3
            model:
              expr: 'rate(container_cpu_usage_seconds_total[5m]) * 100 > 80'
              hide: false
              intervalFactor: 1
              refId: A
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          description: "Container {{ $labels.name }} has high CPU usage ({{ $value }}%)"
          summary: "High CPU usage detected"
        labels:
          severity: warning
