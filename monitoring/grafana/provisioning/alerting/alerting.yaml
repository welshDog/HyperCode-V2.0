apiVersion: 1

contactPoints:
  - orgId: 1
    name: "HyperCode Discord"
    receivers:
      - uid: "broski_discord"
        type: discord
        settings:
          url: "https://discord.com/api/webhooks/1344265743472001085/oGqfWw_t1iN5D6Gg4D-K8-I5Z_r3Y8q2V9x0s1d4f7h2j5k8l3m6n9p0"
          message: |
            {{ template "broski.alert" . }}
        disableResolveMessage: false

templates:
  - orgId: 1
    name: "broski.alert"
    template: |
      {{ define "broski.alert" }}
      🤖 YO! {{ .CommonLabels.alertname }} just fired on {{ .CommonLabels.container }}
      Status: {{ .Status | toUpper }}
      {{ range .Alerts }}
        🔥 {{ .Annotations.summary }}
        Value: {{ .Values.A }}
        Started: {{ .StartsAt }}
      {{ end }}
      {{ end }}

policies:
  - orgId: 1
    receiver: "HyperCode Discord"
    group_by: ["alertname"]
    group_wait: "10s"
    group_interval: "5m"
    repeat_interval: "4h"
