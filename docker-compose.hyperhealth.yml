# ============================================================
# HyperHealth Compose Override
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.hyperhealth.yml up -d
# ============================================================

services:

  # ── HyperHealth Orchestrator API ──────────────────────────────────────────
  hyperhealth-api:
    build:
      context: ./agents/hyperhealth
      dockerfile: Dockerfile
    image: hypercode-v20-hyperhealth-api
    container_name: hyperhealth-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8095:8095"
    environment:
      - PORT=8095
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hypercode}
      - REDIS_URL=redis://redis:6379/0
      - HEALER_URL=http://healer-agent:8008
      - CORE_URL=http://hypercode-core:8000
      - PROMETHEUS_URL=http://prometheus:9090
      - GRAFANA_URL=http://grafana:3000
      - CREW_URL=http://crew-orchestrator:8080
      - API_KEY=${API_KEY:-dev-master-key}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PD_ROUTING_KEY=${PD_ROUTING_KEY:-}
    networks:
      - backend-net
      - data-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hypercode-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    labels:
      - "hypercode.service=hyperhealth-api"
      - "hypercode.role=health-orchestrator"

  # ── HyperHealth Async Worker Pool ─────────────────────────────────────────
  hyperhealth-worker:
    build:
      context: ./agents/hyperhealth
      dockerfile: Dockerfile
    image: hypercode-v20-hyperhealth-worker
    container_name: hyperhealth-worker
    restart: unless-stopped
    command: ["python", "-m", "worker"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hypercode}
      - REDIS_URL=redis://redis:6379/0
      - HEALER_URL=http://healer-agent:8008
      - CORE_URL=http://hypercode-core:8000
      - API_KEY=${API_KEY:-dev-master-key}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - WORKER_CONCURRENCY=50
      - CHECK_BATCH_SIZE=100
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PD_ROUTING_KEY=${PD_ROUTING_KEY:-}
    networks:
      - backend-net
      - data-net
    depends_on:
      hyperhealth-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    labels:
      - "hypercode.service=hyperhealth-worker"
      - "hypercode.role=check-executor"

networks:
  backend-net:
    name: hypercode_public_net
    external: true
  data-net:
    name: hypercode_data_net
    external: true
