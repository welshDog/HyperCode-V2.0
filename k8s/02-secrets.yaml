apiVersion: v1
kind: Secret
metadata:
  name: hypercode-secrets
  namespace: hypercode
type: Opaque
stringData:
  # --- Core Configuration ---
  API_KEY: "hypercode-prod-key-2026"
  HYPERCODE_JWT_SECRET: "hypercode-jwt-prod-secret-change-me-2026"
  JWT_SECRET: "hypercode-jwt-prod-secret-change-me-2026"
  HYPERCODE_MEMORY_KEY: "hypercode-memory-encryption-key-2026"

  # --- AI Providers (Update with real keys) ---
  ANTHROPIC_API_KEY: "sk-ant-placeholder-replace-with-real-key"
  OPENAI_API_KEY: "sk-proj-placeholder-replace-with-real-key"
  PERPLEXITY_API_KEY: "ppl-placeholder-replace-with-real-key"

  # --- Database (PostgreSQL) ---
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "hypercode-postgres-prod-password-2026-secure"
  POSTGRES_DB: "hypercode"
  HYPERCODE_DB_URL: "postgresql://postgres:hypercode-postgres-prod-password-2026-secure@postgres:5432/hypercode"
  DATABASE_URL: "postgresql://postgres:hypercode-postgres-prod-password-2026-secure@postgres:5432/hypercode"

  # --- Redis & Celery ---
  HYPERCODE_REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"

  # --- Grafana ---
  GF_SECURITY_ADMIN_USER: "admin"
  GF_SECURITY_ADMIN_PASSWORD: "grafana-prod-password-2026-change-me"

  # --- MinIO ---
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "minio-prod-password-2026-secure"

  # --- Discord Bot ---
  DISCORD_TOKEN: "your-discord-token-here"
  DISCORD_GUILD_ID: "your-guild-id-here"
