apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: hypercode
spec:
  schedule: "0 2 * * *"  # 2 AM daily
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: postgres:15-alpine
            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: hypercode-secrets
                  key: POSTGRES_PASSWORD
            command: ["/bin/sh", "-c"]
            args:
              - pg_dump -h postgres -U hypercode > /backups/backup-$(date +%Y%m%d).sql
            volumeMounts:
            - name: backups
              mountPath: /backups
          volumes:
          - name: backups
            persistentVolumeClaim:
              claimName: postgres-backups
          restartPolicy: OnFailure
