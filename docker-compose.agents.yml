# docker-compose.agents.yml — HyperCode V2.0 Full Agent Stack
# Self-contained: brings up infra + all agents. No external networks required.
# Run: docker compose -f docker-compose.agents.yml up -d

networks:
  hypercode-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  # ── INFRA ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [hypercode-net]
    volumes: [redis-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine          # I2 fix: aligned with main docker-compose.yml
    restart: unless-stopped
    networks: [hypercode-net]
    volumes: [postgres-data:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: hypercode
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  # ── CORE AGENTS ───────────────────────────────────────────
  healer-agent:                        # H4 fix: renamed from 'healer' to match main compose + lite file
    build: ./agents/healer
    restart: always                    # 🩺 ALWAYS — cannot die
    ports: ["127.0.0.1:8008:8008"]    # I3 fix: localhost-only
    networks: [hypercode-net]
    depends_on:
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 15s
      retries: 3
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/hypercode

  architect:
    build: ./agents/architect
    restart: unless-stopped
    ports: ["127.0.0.1:8080:8080"]    # I3 fix: localhost-only
    networks: [hypercode-net]
    depends_on:
      healer-agent: {condition: service_healthy}   # H4 fix: updated reference
    healthcheck:                       # M2 fix: added health check so system-architect can depend on it
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      REDIS_URL: redis://redis:6379
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  crew-orchestrator:
    build: ./agents/crew-orchestrator
    restart: unless-stopped
    ports: ["127.0.0.1:8081:8081"]    # I3 fix: localhost-only
    networks: [hypercode-net]
    depends_on:
      redis: {condition: service_healthy}
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/hypercode

  memory:
    build: ./agents/memory
    restart: unless-stopped
    ports: ["127.0.0.1:8082:8082"]    # I3 fix: localhost-only
    networks: [hypercode-net]
    depends_on:
      redis: {condition: service_healthy}
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/hypercode

  # ── SPECIALIST AGENTS ─────────────────────────────────────
  coder-agent:                         # H3 fix: added missing service (referenced in agents-lite.yml)
    build: ./agents/coder
    restart: unless-stopped
    ports: ["127.0.0.1:8002:8002"]    # I3 fix: localhost-only
    networks: [hypercode-net]
    depends_on:
      crew-orchestrator: {condition: service_started}
    environment:
      CORE_URL: http://crew-orchestrator:8081
      AGENT_PORT: "8002"

  frontend-specialist:
    build: ./agents/01-frontend-specialist
    restart: unless-stopped
    networks: [hypercode-net]
    depends_on:
      crew-orchestrator: {condition: service_started}

  backend-specialist:
    build: ./agents/02-backend-specialist
    restart: unless-stopped
    networks: [hypercode-net]
    depends_on:
      crew-orchestrator: {condition: service_started}

  database-architect:
    build: ./agents/03-database-architect
    restart: unless-stopped
    networks: [hypercode-net]
    depends_on:
      postgres: {condition: service_healthy}

  qa-engineer:
    build: ./agents/04-qa-engineer
    restart: unless-stopped
    networks: [hypercode-net]
    depends_on:
      crew-orchestrator: {condition: service_started}

  devops-engineer:
    build: ./agents/05-devops-engineer
    restart: unless-stopped
    networks: [hypercode-net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  security-engineer:
    build: ./agents/06-security-engineer
    restart: unless-stopped
    networks: [hypercode-net]

  system-architect:
    build: ./agents/07-system-architect
    restart: unless-stopped
    networks: [hypercode-net]
    depends_on:                        # M1 fix: modern map syntax (was deprecated list syntax)
      architect:
        condition: service_started

  project-strategist:
    build: ./agents/08-project-strategist
    restart: unless-stopped
    networks: [hypercode-net]
    depends_on:
      crew-orchestrator: {condition: service_started}

  tips-tricks-writer:                  # H4 fix: renamed from 'tips-writer' to match lite file
    build: ./agents/09-tips-tricks-writer
    restart: unless-stopped
    networks: [hypercode-net]

  # ── INTERFACE LAYER ───────────────────────────────────────
  broski-terminal:
    build: ./agents/broski-bot
    restart: unless-stopped
    ports: ["127.0.0.1:3000:3000"]    # I3 fix: localhost-only
    networks: [hypercode-net]
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
