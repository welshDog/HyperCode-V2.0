    depends_on:
      redis:
        condition: service_healthy
      hypercode-core:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    ports:
      - "127.0.0.1:8081:8080"
    restart: unless-stopped
    command: >
      sh -c "python -m arq task_queue.WorkerSettings &
             uvicorn main:app --host 0.0.0.0 --port 8080"
    deploy:
      resources:
        limits:
          cpus: "0.5"
