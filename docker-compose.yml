networks:
  frontend-net:
    driver: bridge
    name: hypercode_frontend_net
  backend-net:
    name: hypercode_public_net
    external: true
  data-net:
    driver: bridge
    name: hypercode_data_net
    internal: true
  hypercode-agents-net:               
    name: hypercode-v20_hypercode-net
    external: true                    

volumes:
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/redis
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/postgres
  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/grafana
  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/prometheus
  ollama-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/ollama
  agent_memory:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/agent_memory
  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/minio
  chroma_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/chroma
  tempo-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/tempo

services:
  # ====================
  # INFRASTRUCTURE
  # ====================
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000 --protected-mode no
    volumes:
      - redis-data:/data
    networks:
      - backend-net
      - data-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hypercode}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend-net
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ====================
  # CORE SERVICES
  # ====================
  hypercode-core:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hypercode-core
    environment:
      - ENVIRONMENT=development
      - PRISMA_PY_DEBUG=0
      - HYPERCODE_REDIS_URL=${HYPERCODE_REDIS_URL}
      - HYPERCODE_DB_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hypercode}
      - HYPERCODE_MEMORY_KEY=${HYPERCODE_MEMORY_KEY}
      - API_KEY=${API_KEY}
      - HYPERCODE_JWT_SECRET=${HYPERCODE_JWT_SECRET}
      - JWT_SECRET=${HYPERCODE_JWT_SECRET} # Ensure backward compatibility
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY} # Cloud API Key (Optional)
      - OLLAMA_HOST=http://hypercode-ollama:11434
      - DEFAULT_LLM_MODEL=auto
      - OLLAMA_MODEL_PREFERRED=tinyllama:latest,tinyllama,phi3:latest,phi3
      - OLLAMA_MAX_MODEL_SIZE_MB=2500
      - OLLAMA_MODEL_REFRESH_SECONDS=300
      - OLLAMA_TEMPERATURE=0.3
      - OLLAMA_TOP_P=0.9
      - OLLAMA_TOP_K=40
      - OLLAMA_REPEAT_PENALTY=1.1
      - OLLAMA_NUM_CTX=2048
      - OLLAMA_NUM_PREDICT=256
      - PERPLEXITY_SESSION_AUTH=true
      - OTLP_EXPORTER_DISABLED=${OTLP_EXPORTER_DISABLED}
      - OTLP_ENDPOINT=http://tempo:4317
      - PROMETHEUS_METRICS_DISABLED=false
      - DB_AUTO_CREATE=true
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:8088,http://127.0.0.1:8088,http://localhost:3000,http://127.0.0.1:3000}
    volumes:
      - ./backend/alembic:/app/alembic:ro
      - ./backend/alembic.ini:/app/alembic.ini:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      hypercode-ollama:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    ports:
      - "127.0.0.1:8000:8000" # Localhost only for security
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ====================
  # BUSINESS AGENTS
  # ====================
  # project-strategist-v2 removed (H2 fix) — duplicate of the profiled project-strategist.
  # Start with: docker compose --profile agents up -d

  # ====================
  # BROSKI BOT
  # ====================
  broski-bot:
    profiles: ["discord"]
    build:
      context: ./agents/broski-bot
      dockerfile: Dockerfile
    container_name: broski-bot
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DATABASE_URL=${HYPERCODE_DB_URL}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hypercode
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENABLE_AUTO_MODERATION=true
      - ENABLE_ANALYTICS=true
      - PROMETHEUS_ENABLED=true
      - PROMETHEUS_PORT=8000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: ["python", "/app/src/main.py", "run"]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./agents/broski-bot:/app
      - ./docs/outputs:/app/outputs

  # OBSERVABILITY
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - ./monitoring/prometheus/docker_alerts.yml:/etc/prometheus/docker_alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000" # Changed to 3001 to avoid conflict with dashboard
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    # privileged: true # Required for some filesystem metrics in Docker Desktop
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      # Explicitly enable collectors that might be failing or disabled by default
      - '--collector.filesystem'
      - '--collector.cpu'
      - '--collector.meminfo'
      - '--collector.netclass.ignored-devices=^$' # Try to catch all devices
    ports:
      - "9100:9100"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # cAdvisor - Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    # privileged: true # Required for cAdvisor to access Docker internals
    # Using specific mounts instead of privileged mode for better security
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8090:8080" # Mapped to 8090 to avoid conflict with other services
    networks:
      - backend-net
    restart: unless-stopped
    devices:
      - /dev/kmsg
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MinIO - S3 Compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"  # API
      - "127.0.0.1:9001:9001"  # Console
    networks:
      - backend-net
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ChromaDB - Vector Database (RAG)
  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=${CHROMA_ALLOW_RESET:-FALSE}
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "127.0.0.1:8009:8000" # Mapped to 8009 to avoid conflict with everything else (8000, 8001, 8002 taken)
    networks:
      - backend-net
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8000' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml
    networks:
      - backend-net
    healthcheck:
      disable: true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tempo:
    image: grafana/tempo:2.4.2
    container_name: tempo
    user: root
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/lib/tempo
    ports:
      - "3200:3200"   # tempo
      - "4317:4317"  # otlp grpc
      - "4318:4318"  # otlp http
      - "9412:9411"   # zipkin (changed from 9411 to avoid conflict with Jaeger)
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "echo OK"]
      interval: 60s
      timeout: 5s
      retries: 2
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "echo OK"]
      interval: 60s
      timeout: 5s
      retries: 2
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: celery-worker
    command: ["python", "-m", "celery", "-A", "app.core.celery_app", "worker", "--loglevel=info", "-Q", "main-queue"]
    dns:
      - 8.8.8.8
    volumes:
      - ./backend:/app
      - ./docs/outputs:/app/outputs
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      PYTHONPATH: /home/appuser/.local/lib/python3.11/site-packages:/app
      HYPERCODE_DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hypercode}
      HYPERCODE_REDIS_URL: redis://redis:6379/0
      HYPERCODE_MEMORY_KEY: ${HYPERCODE_MEMORY_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "python -m celery -A app.core.celery_app inspect ping --timeout=5 || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
      hypercode-core:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: celery-exporter
    command: --broker-url=redis://redis:6379/0
    ports:
      - "9808:9808"
    networks:
      - backend-net
      - data-net
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9808/metrics', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Docker Janitor (DISABLED - meltwater/docker-cleanup has Docker API version mismatch)
  # Replaced by auto-prune below which uses docker:cli and is always version-compatible
  docker-janitor:
    profiles: ["disabled"]
    image: meltwater/docker-cleanup:latest
    container_name: docker-janitor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CLEAN_PERIOD=1800
      - DELAY_TIME=600
      - KEEP_IMAGES=true
      - KEEP_CONTAINERS=true
      - CLEAN_STOPPED_CONTAINERS=false
      - CLEAN_UNUSED_IMAGES=false
      - CLEAN_UNUSED_VOLUMES=false

  # Auto Prune - Smart Docker cleanup (replaces docker-janitor)
  # Runs every hour: prunes stopped containers, old images (48h+), keeps 5GB build cache max
  auto-prune:
    image: docker:cli
    container_name: auto-prune
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "echo '0 * * * * docker container prune -f && docker image prune -f --filter until=48h && docker builder prune -f --keep-storage=5gb' > /etc/crontabs/root && crond -f"
    restart: unless-stopped
    networks:
      - backend-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Security Scanner (Trivy)
  security-scanner:
    image: aquasec/trivy:latest
    container_name: security-scanner
    entrypoint: ["/bin/sh", "-c", "while true; do trivy image hypercode-core:latest; sleep 86400; done"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./reports/security:/reports
    networks:
      - backend-net
    restart: unless-stopped

  # ====================
  # AGENTS
  # ====================
  
  coder-agent:
    profiles: ["agents"]
    build:
      context: ./agents/coder
      dockerfile: Dockerfile
    container_name: coder-agent
    environment:
      - CORE_URL=http://hypercode-core:8000
      - PROMETHEUS_URL=http://prometheus:9090
      - HYPERCODE_API_KEY=${API_KEY:-dev-master-key}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - AGENT_PORT=8002
    volumes:
      - ./agents/coder/workspace:/workspace
      - ./agents/base-agent/agent.py:/app/base_agent.py:ro
      - ./Configuration_Kit:/app/hive_mind:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agents/shared:/app/shared:ro
      - ./agents/HYPER-AGENT-BIBLE.md:/app/HYPER-AGENT-BIBLE.md:ro
      - agent_memory:/app/memory
    ports:
      - "8002:8002"
    networks:
      - backend-net
    depends_on:
      hypercode-core:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  dashboard:
    build:
      context: ./agents/dashboard
      dockerfile: Dockerfile
    container_name: hypercode-dashboard
    environment:
      - NEXT_PUBLIC_CORE_URL=http://hypercode-core:8000
      - NEXT_PUBLIC_ORCHESTRATOR_WS_HOST=localhost
      - NEXT_PUBLIC_ORCHESTRATOR_WS_PORT=8081
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) process.exit(1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    ports:
      - "127.0.0.1:8088:3000" # Public facing dashboard
    depends_on:
      hypercode-core:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  hyper-mission-api:
    profiles: ["mission"]
    build:
      context: ./hyper-mission-system/server
      dockerfile: Dockerfile
    container_name: hyper-mission-api
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CORE_API_URL=http://hypercode-core:8000/api/v1
      - AUTH_PASSTHROUGH=true
      - REDIS_URL=redis://redis:6379
    depends_on:
      hypercode-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {if (r.statusCode !== 200) process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  hyper-mission-ui:
    profiles: ["mission"]
    build:
      context: ./hyper-mission-system/client
