version: "3.9"

networks:
  frontend-net:
    driver: bridge
    name: hypercode_frontend_net
  backend-net:
    name: hypercode_public_net
    external: true
  data-net:
    driver: bridge
    name: hypercode_data_net
    internal: true

volumes:
  redis-data:
  postgres-data:
  grafana-data:
  prometheus-data:
  ollama-data:
  agent_memory:

services:
  # ====================
  # CORE SERVICES
  # ====================
  hypercode-core:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hypercode-core
    environment:
      - ENVIRONMENT=production
      - PRISMA_PY_DEBUG=0
      - HYPERCODE_REDIS_URL=${HYPERCODE_REDIS_URL}
      - HYPERCODE_DB_URL=${HYPERCODE_DB_URL}
      - HYPERCODE_MEMORY_KEY=${HYPERCODE_MEMORY_KEY}
      - API_KEY=${API_KEY}
      - HYPERCODE_JWT_SECRET=${HYPERCODE_JWT_SECRET}
      - JWT_SECRET=${HYPERCODE_JWT_SECRET} # Ensure backward compatibility
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OTLP_EXPORTER_DISABLED=${OTLP_EXPORTER_DISABLED}
      - OTLP_ENDPOINT=http://tempo:4317
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    ports:
      - "127.0.0.1:8000:8000" # Localhost only for security
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./backend:/app

  # Frontend - Terminal
  # broski-terminal:
  #   build:
  #     context: ./BROski Business Agents/broski-terminal
  #     dockerfile: Dockerfile
  #   container_name: broski-terminal
  #   environment:
  #     NEXT_PUBLIC_CORE_URL: ${NEXT_PUBLIC_CORE_URL:-http://localhost:8000}
  #     NEXT_PUBLIC_AGENTS_URL: ${NEXT_PUBLIC_AGENTS_URL:-http://localhost:8000}
  #     HOSTNAME: "0.0.0.0"
  #   healthcheck:
  #     test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) process.exit(1)})"]
  #     interval: 30s
  #     timeout: 10s
