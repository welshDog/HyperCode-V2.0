version: "3.9"

networks:
  frontend-net:
    driver: bridge
    name: hypercode_frontend_net
  backend-net:
    name: hypercode_public_net
    external: true
  data-net:
    driver: bridge
    name: hypercode_data_net
    internal: true

volumes:
  redis-data:
  postgres-data:
  grafana-data:
  prometheus-data:
  ollama-data:
  agent_memory:
  minio_data:
  chroma_data:
  tempo-data:

services:
  # ====================
  # INFRASTRUCTURE
  # ====================
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend-net
      - data-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hypercode}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend-net
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ====================
  # CORE SERVICES
  # ====================
  hypercode-core:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hypercode-core
    environment:
      - ENVIRONMENT=production
      - PRISMA_PY_DEBUG=0
      - HYPERCODE_REDIS_URL=${HYPERCODE_REDIS_URL}
      - HYPERCODE_DB_URL=${HYPERCODE_DB_URL}
      - HYPERCODE_MEMORY_KEY=${HYPERCODE_MEMORY_KEY}
      - API_KEY=${API_KEY}
      - HYPERCODE_JWT_SECRET=${HYPERCODE_JWT_SECRET}
      - JWT_SECRET=${HYPERCODE_JWT_SECRET} # Ensure backward compatibility
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OTLP_EXPORTER_DISABLED=${OTLP_EXPORTER_DISABLED}
      - OTLP_ENDPOINT=http://tempo:4317
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    ports:
      - "127.0.0.1:8000:8000" # Localhost only for security
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s

  # ====================
  # BUSINESS AGENTS
  # ====================
  project-strategist-v2:
    build:
      context: ./agents/business/project-strategist
      dockerfile: Dockerfile
    container_name: project-strategist-v2
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ====================
  # BROSKI BOT
  # ====================
  broski-bot:
    build:
      context: ./agents/broski-bot
      dockerfile: Dockerfile
    container_name: broski-bot
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DATABASE_URL=${HYPERCODE_DB_URL}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hypercode
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENABLE_AUTO_MODERATION=true
      - ENABLE_ANALYTICS=true
      - PROMETHEUS_ENABLED=true
      - PROMETHEUS_PORT=8000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: ["python", "/app/src/main.py", "run"]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./agents/broski-bot:/app
      - ./docs/outputs:/app/outputs

  # Frontend - Terminal
  # broski-terminal:
  #   build:
  #     context: ./BROski Business Agents/broski-terminal
  #     dockerfile: Dockerfile
  #   container_name: broski-terminal
  #   environment:
  #     NEXT_PUBLIC_CORE_URL: ${NEXT_PUBLIC_CORE_URL:-http://localhost:8000}
  #     NEXT_PUBLIC_AGENTS_URL: ${NEXT_PUBLIC_AGENTS_URL:-http://localhost:8000}
  #     HOSTNAME: "0.0.0.0"
  #   healthcheck:
  #     test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) process.exit(1)})"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #   networks:
  #     - frontend-net
  #     - backend-net
  #   ports:
  #     - "3000:3000" # Public facing
  #   depends_on:
  #     hypercode-core:
  #       condition: service_healthy
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "1"
  #         memory: 1G
  #       reservations:
  #         cpus: "0.25"
  #         memory: 256M
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"
  #   security_opt:
  #     - no-new-privileges:true

  # OBSERVABILITY
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - ./monitoring/prometheus/docker_alerts.yml:/etc/prometheus/docker_alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000" # Changed to 3001 to avoid conflict with dashboard
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    # privileged: true # Required for some filesystem metrics in Docker Desktop
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      # Explicitly enable collectors that might be failing or disabled by default
      - '--collector.filesystem'
      - '--collector.cpu'
      - '--collector.meminfo'
      - '--collector.netclass.ignored-devices=^$' # Try to catch all devices
    ports:
      - "9100:9100"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # cAdvisor - Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    # privileged: true # Required for cAdvisor to access Docker internals
    # Using specific mounts instead of privileged mode for better security
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8090:8080" # Mapped to 8090 to avoid conflict with other services
    networks:
      - backend-net
    restart: unless-stopped
    devices:
      - /dev/kmsg
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MinIO - S3 Compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    networks:
      - backend-net
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ChromaDB - Vector Database (RAG)
  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8009:8000" # Mapped to 8009 to avoid conflict with everything else (8000, 8001, 8002 taken)
    networks:
      - backend-net
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8000' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    user: root
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/lib/tempo
    ports:
      - "3200:3200"   # tempo
      - "4317:4317"  # otlp grpc
      - "4318:4318"  # otlp http
      - "9412:9411"   # zipkin (changed from 9411 to avoid conflict with Jaeger)
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3101/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: celery-worker
    command: ["python", "-m", "celery", "-A", "app.core.celery_app", "worker", "--loglevel=info", "-Q", "main-queue"]
    dns:
      - 8.8.8.8
    volumes:
      - ./backend:/app
      - ./docs/outputs:/app/outputs
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      PYTHONPATH: /home/appuser/.local/lib/python3.11/site-packages:/app
      HYPERCODE_DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hypercode}
      HYPERCODE_REDIS_URL: redis://redis:6379/0
      HYPERCODE_MEMORY_KEY: ${HYPERCODE_MEMORY_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "python -m celery -A app.core.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      hypercode-core:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: celery-exporter
    command: --broker-url=redis://redis:6379/0
    ports:
      - "9808:9808"
    networks:
      - backend-net
      - data-net
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9808/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Docker Janitor (Auto-Cleanup)
  docker-janitor:
    image: meltwater/docker-cleanup:latest
    container_name: docker-janitor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CLEAN_PERIOD=1800 # Run every 30 minutes
      - DELAY_TIME=600 # Wait 10 minutes before removing
      - KEEP_IMAGES=true # Don't remove images by default (safety)
      - KEEP_CONTAINERS=true # Only remove stopped containers if specified (safety first)
      - CLEAN_STOPPED_CONTAINERS=false
      - CLEAN_UNUSED_IMAGES=false
      - CLEAN_UNUSED_VOLUMES=false 
      # We will use a more targeted script or command via cron if needed, 
      # but for now, let's use a safer "prune" approach via a periodic task container
      # Actually, let's use a simple alpine container with a cron job for maximum control
  
  auto-prune:
    image: docker:cli
    container_name: auto-prune
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "echo '0 * * * * docker system prune -f --filter \"until=24h\"' > /etc/crontabs/root && crond -f"
    restart: unless-stopped
    networks:
      - backend-net

  # Security Scanner (Trivy)
  security-scanner:
    image: aquasec/trivy:latest
    container_name: security-scanner
    entrypoint: ["/bin/sh", "-c", "while true; do trivy image hypercode-core:latest; sleep 86400; done"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./reports/security:/reports
    networks:
      - backend-net
    restart: unless-stopped

  # ====================
  # AGENTS
  # ====================
  
  coder-agent:
    profiles: ["agents"]
    build:
      context: ./agents/coder
      dockerfile: Dockerfile
    container_name: coder-agent
    environment:
      - CORE_URL=http://hypercode-core:8000
      - PROMETHEUS_URL=http://prometheus:9090
      - HYPERCODE_API_KEY=${API_KEY:-dev-master-key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENT_PORT=8002
    volumes:
      - ./agents/coder/workspace:/workspace
      - ./agents/base-agent/agent.py:/app/base_agent.py:ro
      - ./Configuration_Kit:/app/hive_mind:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agents/shared:/app/shared:ro
      - ./agents/HYPER-AGENT-BIBLE.md:/app/HYPER-AGENT-BIBLE.md:ro
      - agent_memory:/app/memory
    ports:
      - "8002:8002"
    networks:
      - backend-net
    depends_on:
      hypercode-core:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  dashboard:
    build:
      context: ./agents/dashboard
      dockerfile: Dockerfile
    container_name: hypercode-dashboard
    environment:
      - NEXT_PUBLIC_CORE_URL=http://hypercode-core:8000
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {if (r.statusCode !== 200) process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    ports:
      - "8088:3000" # Public facing dashboard
    depends_on:
      hypercode-core:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  crew-orchestrator:
    profiles: ["agents"]
    build:
      context: ./agents/crew-orchestrator
      dockerfile: Dockerfile
    container_name: crew-orchestrator
    environment:
      - CORE_URL=http://hypercode-core:8000
      - AGENT_ROLE=crew-orchestrator
      - REDIS_URL=redis://redis:6379
      - ORCHESTRATOR_REDIS_HOST=redis
      - ORCHESTRATOR_REDIS_PORT=6379
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./agents/crew-orchestrator:/app
      - ./Configuration_Kit:/app/hive_mind:ro
      - ./agents/shared:/app/shared:ro
      - ./agents/HYPER-AGENT-BIBLE.md:/app/HYPER-AGENT-BIBLE.md:ro
      - agent_memory:/app/memory
    networks:
      - backend-net
    ports:
      - "8081:8080" # Map 8081 external to 8080 internal
    depends_on:
      hypercode-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"] # Check internal port 8080
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  project-strategist:
    profiles: ["agents"]
    build:
      context: ./agents/business/project-strategist
      dockerfile: Dockerfile
    container_name: project-strategist
    environment:
      - CORE_URL=http://hypercode-core:8000
      - AGENT_ROLE=project-strategist
      - AGENT_PORT=8001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./agents/business/project-strategist:/app
      - ./Configuration_Kit:/app/hive_mind:ro
      - ./agents/shared:/app/shared:ro
      - ./agents/HYPER-AGENT-BIBLE.md:/app/HYPER-AGENT-BIBLE.md:ro
      - agent_memory:/app/memory
    networks:
      - backend-net
    ports:
      - "8001:8001"
    depends_on:
      hypercode-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  frontend-specialist:
    profiles: ["agents"]
    build:
      context: ./agents/01-frontend-specialist
      dockerfile: Dockerfile
    container_name: frontend-specialist
    environment:
      - CORE_URL=http://hypercode-core:8000
      - AGENT_ROLE=frontend-specialist
      - AGENT_PORT=8002
    volumes:
      - ./agents/01-frontend-specialist:/app
      - ./Configuration_Kit:/app/hive_mind:ro
      - ./agents/shared:/app/shared:ro
      - ./agents/HYPER-AGENT-BIBLE.md:/app/HYPER-AGENT-BIBLE.md:ro
      - agent_memory:/app/memory
    networks:
      - backend-net
    ports:
      - "8002:8002"
    depends_on:
      hypercode-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

