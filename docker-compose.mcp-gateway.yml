# ============================================================================
# MCP Gateway + Ollama Profile for HyperCode V2.0
# ============================================================================
# Enable with: docker compose -f docker-compose.yml -f docker-compose.mcp-gateway.yml up -d
#
# This profile adds:
# 1. MCP Gateway: Central tool access control for all agents
# 2. Ollama: Local LLM orchestration (Windows Docker Desktop compatible)
# 3. MCP Tools: GitHub, PostgreSQL, File System, ChromaDB/RAG
# 4. Agent Integration: Wire agents to use MCP tools via gateway
#
# Architecture:
#   [Agent] -> [MCP Gateway:8820] -> [MCP Tools/Models]
#              ^
#              Auth, Rate Limiting, Audit Logging
#
# FIX LOG:
# - Removed obsolete 'version:' key (Docker Compose v2 warning)
# - Replaced all fake modelcontextprotocol/* images with real equivalents
# - Replaced docker/model-runner with ollama/ollama (actually exists)
# - MCP tool servers run via npx on node:20-alpine (official MCP approach)
# ============================================================================

services:

  # ====================
  # MCP GATEWAY
  # ====================
  # ✅ REAL image: docker/mcp-gateway is live on Docker Hub
  mcp-gateway:
    image: docker/mcp-gateway:latest
    container_name: mcp-gateway
    environment:
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8820
      - LOG_LEVEL=info
      - ENABLE_AUDIT_LOG=true
      - AUDIT_LOG_PATH=/var/log/mcp-gateway
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_PER_MINUTE=1000
      - RATE_LIMIT_PER_HOUR=50000
      - AUTH_ENABLED=true
      - AUTH_TYPE=api_key
      - AUTO_DISCOVER_TOOLS=true
      - AUDIT_DB_URL=postgresql://postgres:${POSTGRES_PASSWORD:-hypercode123}@postgres:5432/mcp_audit
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/mcp-gateway:/var/log/mcp-gateway
    ports:
      - "127.0.0.1:8820:8820"
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8820/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # ====================
  # LOCAL LLM (OLLAMA)
  # ====================
  # ✅ REAL image: ollama/ollama — works on Windows Docker Desktop
  # Replaces fake docker/model-runner image
  # OpenAI-compatible API on port 11434
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 6G
        reservations:
          cpus: "1"
          memory: 2G
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ====================
  # MCP TOOLS
  # ====================

  # ✅ GitHub MCP Server — official image from GitHub Container Registry
  mcp-github:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: mcp-github
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN:-changeme}
      - PORT=3001
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cap_drop:
      - ALL

  # ✅ PostgreSQL MCP Server — official @modelcontextprotocol/server-postgres via npx
  mcp-postgres:
    image: node:20-alpine
    container_name: mcp-postgres
    command: >
      sh -c "npx -y @modelcontextprotocol/server-postgres
      postgresql://postgres:${POSTGRES_PASSWORD:-hypercode123}@postgres:5432/${POSTGRES_DB:-hypercode}"
    environment:
      - PORT=3002
    ports:
      - "127.0.0.1:3002:3002"
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cap_drop:
      - ALL

  # ✅ File System MCP Server — official @modelcontextprotocol/server-filesystem via npx
  mcp-filesystem:
    image: node:20-alpine
    container_name: mcp-filesystem
    command: >
      sh -c "npx -y @modelcontextprotocol/server-filesystem /workspace /data"
    environment:
      - PORT=3003
    volumes:
      - ./agents:/workspace:rw
      - ./data:/data:rw
    ports:
      - "127.0.0.1:3003:3003"
    networks:
      - backend-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cap_drop:
      - ALL

  # ✅ ChromaDB — direct official image (replaces fake mcp-vectordb)
  # Agents query it directly via HTTP on port 8000
  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=false
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ====================
  # AGENT MCP CLIENT
  # ====================
  backend-specialist-mcp:
    profiles: ["agents"]
    build:
      context: ./agents/02-backend-specialist
      dockerfile: Dockerfile
    container_name: backend-specialist-mcp
    environment:
      - CORE_URL=http://hypercode-core:8000
      - AGENT_ROLE=backend-specialist
      - AGENT_PORT=8003
      - MCP_GATEWAY_URL=http://mcp-gateway:8820
      - MCP_GATEWAY_API_KEY=${MCP_GATEWAY_API_KEY:-agent-key-001}
      - MCP_TOOLS_ENABLED=true
      - MCP_TOOLS_LIST=github,postgres,filesystem,vectordb
      # Updated: point to ollama instead of model-runner
      - LLM_ENDPOINT=http://ollama:11434
      - LLM_MODEL=phi3:mini
    volumes:
      - ./agents/02-backend-specialist:/app
      - ./Configuration_Kit:/app/hive_mind:ro
      - ./agents/shared:/app/shared:ro
      - ./agents/base-agent/agent.py:/app/base_agent.py:ro
      - ./agents/HYPER-AGENT-BIBLE.md:/app/HYPER-AGENT-BIBLE.md:ro
      - agent_memory:/app/memory
    networks:
      - backend-net
    ports:
      - "8003:8003"
    depends_on:
      hypercode-core:
        condition: service_healthy
      mcp-gateway:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # ====================
  # OBSERVABILITY
  # ====================
  mcp-exporter:
    image: prom/node-exporter:latest
    container_name: mcp-exporter
    command:
      - "--collector.textfile.directory=/var/lib/node_exporter/textfile_collector"
      - "--collector.netclass.ignored-devices=^$"
    volumes:
      - ./monitoring/mcp-metrics:/var/lib/node_exporter/textfile_collector:ro
    ports:
      - "9101:9100"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama_models:
    driver: local
  chroma_data:
    driver: local
